# One-click deploy on Render (free tier). Push this repo to GitHub, then in the
# Render dashboard: New → Blueprint → pick this repo. Set GROQ_API_KEY when prompted.
services:
  - type: web
    name: financial-analyst-agent
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false            # set this secret in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
